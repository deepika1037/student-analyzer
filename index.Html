<!DOCTYPE html>
<html>
<head>
<title>AI Student Performance Predictor</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:350px;
text-align:center;
}

h1{
margin-bottom:5px;
}

p{
color:gray;
margin-bottom:25px;
}

.role-buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

.role-buttons button{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:white;
cursor:pointer;
}

.role-buttons button.active{
background:#2563eb;
}

.input-box{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #333;
background:#111;
color:white;
}

.signin{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.google-btn{
width:100%;
padding:12px;
border-radius:10px;
background:#111;
border:1px solid #333;
color:white;
margin-top:20px;
cursor:pointer;
}

.footer{
margin-top:15px;
font-size:13px;
color:gray;
}

.footer span{
color:#3b82f6;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Welcome Back</h1>
<p>Please enter your details to sign in.</p>

<div class="role-buttons">
<button>Admin</button>
<button class="active">Faculty</button>
<button>Student</button>
</div>

<input class="input-box" type="text" placeholder="Username">

<input class="input-box" type="password" placeholder="Password">

<button class="signin" onclick="login()">Sign In →</button>

<button class="google-btn">Sign in with Google</button>

<div class="footer">
Don't have an account? <span>Contact Admin</span>
</div>

</div>

<script>

function login(){
alert("Login Successful!");
window.location.href="dashboard.html";
}

</script>

</body>
</html>
